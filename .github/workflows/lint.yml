name: lint

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - name: Setup pnpm (corepack)
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm --version
      
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
