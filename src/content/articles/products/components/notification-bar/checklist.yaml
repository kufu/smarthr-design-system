items:
  # 使用上の注意 > フィードバックではないサービス運営上のお知らせなどを画面全体（ヘッダーの下）で使用しない
  - severity: must
    text: 'NotificationBar を画面全体（ヘッダーの下）で使用する場合は、システムからのフィードバックの表示に限定する'
    source_section: '使用上の注意 > フィードバックではないサービス運営上のお知らせなどを画面全体（ヘッダーの下）で使用しない'

  - severity: must
    text: 'システムからの応答としてのフィードバックではない、その他の重要なお知らせや情報の表示が必要な場合は、ベースありや InformationPanel などを使用する'
    source_section: '使用上の注意 > フィードバックではないサービス運営上のお知らせなどを画面全体（ヘッダーの下）で使用しない'

  # 使用上の注意 > メッセージは省略表示しない
  - severity: avoid
    text: 'NotificationBar のメッセージを LineClamp で省略表示しない'
    source_section: '使用上の注意 > メッセージは省略表示しない'

  - severity: should
    text: 'NotificationBar のメッセージは簡潔な一行程度の文章になるように調整する'
    source_section: '使用上の注意 > メッセージは省略表示しない'

  - severity: should
    text: 'どうしても情報量や他の要素を併記する必要がある場合は、テキストリンクで移動先のヘルプページなどに情報を記載するか、ベースありや InformationPanel などを使用して十分な表示領域を確保する'
    source_section: '使用上の注意 > メッセージは省略表示しない'

  # 状態 > 強調
  - severity: should
    text: 'ユーザーへのアテンションを高めたい場合は、`bold` にすることを検討する'
    source_section: '状態 > 強調'
    sub_items:
      - 'ユーザーが行った操作の成功・失敗などの結果を画面全体（ヘッダーの下）に表示する場合'

  # 状態 > レイアウト > ベースあり
  - severity: should
    text: '特定の操作範囲へのフィードバックなど Base 内に配置する場合を除き、画面内に単体で配置する場合は基本的に `base="base"` を使用する'
    source_section: '状態 > レイアウト > ベースあり'

  # デザインパターン > ページ全体の操作へのフィードバック
  - severity: must
    text: 'ページ全体の操作へのフィードバックでは、メッセージが表示されたことを強調するためにアニメーションを有効にする'
    source_section: 'デザインパターン > ページ全体の操作へのフィードバック'

  - severity: avoid
    text: 'NotificationBar を時間の経過で閉じない（ユーザーの明示的な操作で非表示にする）'
    source_section: 'デザインパターン > ページ全体の操作へのフィードバック'

  # デザインパターン > ページ全体の操作へのフィードバック > 操作箇所から離れている場合はスクロール追従するようにフィードバックを表示
  - severity: should
    text: '操作するボタンなどと NotificationBar が視覚的に離れている場合は、`position: sticky` でスクロールに追従させる'
    source_section: 'デザインパターン > ページ全体の操作へのフィードバック > 操作箇所から離れている場合はスクロール追従するようにフィードバックを表示'

  # モバイル > メッセージの折り返し
  - severity: should
    text: 'モバイルでメッセージが複数行になっても見づらくならないよう、冗長な表現を避けて端的なメッセージになるように検討する'
    source_section: 'モバイル > メッセージの折り返し'

  - severity: should
    text: 'モバイルでどうしても長くなり見づらくなる場合は、テキストリンクで移動先のヘルプページに情報を記載するか、ベースありや InformationPanel などの使用も検討する'
    source_section: 'モバイル > メッセージの折り返し'

  # モバイル > 特定の操作範囲へのフィードバックでの表示位置
  - severity: should
    text: 'モバイルで NotificationBar が操作範囲外に表示される場合は、ユーザーがフィードバックを確認できる位置での表示方法を検討する'
    source_section: 'モバイル > 特定の操作範囲へのフィードバックでの表示位置'
