# 使用上の注意 > 入力要素が1つの場合にのみ使用する
- severity: must
  text: "FormControl は入力要素が 1 つだけの場合にのみ使用する"
  source_section: "使用上の注意 > 入力要素が1つの場合にのみ使用する"

- severity: must
  text: "値を分割して入力する場合や Checkbox / RadioButton など複数の入力要素を持つフォームに対してラベルやメッセージテキストを表示したい場合は Fieldset を使用する"
  source_section: "使用上の注意 > 入力要素が1つの場合にのみ使用する"

# 使用上の注意 > 入力要素が1つの場合にのみ使用する > 複数のフォームを横に並べる場合
- severity: should
  text: "入力要素をグルーピングできる場合は基本的に Fieldset を使用する"
  source_section: "使用上の注意 > 入力要素が1つの場合にのみ使用する > 複数のフォームを横に並べる場合"

- severity: must
  text: "やむを得ず FormControl を横に並べる場合はエラー表示時にレイアウトが崩れないか注意する"
  source_section: "使用上の注意 > 入力要素が1つの場合にのみ使用する > 複数のフォームを横に並べる場合"

# レイアウト > ステータスラベルの有無
- severity: should
  text: "フォーム入力が必須か任意かをユーザーが区別できるようにステータスラベルを使用する"
  source_section: "レイアウト > ステータスラベルの有無"

# レイアウト > ステータスラベルの有無 > ステータスラベルの省略 > 必須を省略するケース
- severity: should
  text: "認知負荷を減らすために必須ステータスラベルの省略を検討する"
  source_section: "レイアウト > ステータスラベルの有無 > ステータスラベルの省略 > 必須を省略するケース"
  sub_items:
    - "フォーム入力が極めて少なく、すべて必須であることが自明な場合"
    - "任意のフォームよりも入力必須のフォームが多い場合"

# レイアウト > ステータスラベルの有無 > ステータスラベルの省略 > ステータスラベル自体を省略するケース
- severity: should
  text: "フォームの説明文などですべての項目が必須または任意であることが明記されている場合は、ステータスラベル自体の省略を検討する"
  source_section: "レイアウト > ステータスラベルの有無 > ステータスラベルの省略 > ステータスラベル自体を省略するケース"

# レイアウト > メッセージテキストの有無
- severity: must
  text: "入力要素の `placeholder` の代替として、入力例は `exampleMessage` を使用する"
  source_section: "レイアウト > メッセージテキストの有無"

# レイアウト > メッセージテキストの有無 > エラーメッセージ
- severity: must
  text: "エラーメッセージは入力必須の入力要素の値が空、またはデータ型が異なるなど適切な値が入力されていない場合に表示する"
  source_section: "レイアウト > メッセージテキストの有無 > エラーメッセージ"

- severity: must
  text: "どの入力要素がエラーかを視覚的に見つけやすくするため、入力要素にも `error` 状態を付加する"
  source_section: "レイアウト > メッセージテキストの有無 > エラーメッセージ"

- severity: must
  text: "同一画面上でエラーをリアルタイムに判定できる場合は、エラーの原因が解消されたらメッセージの表示を止める"
  source_section: "レイアウト > メッセージテキストの有無 > エラーメッセージ"

# 状態 > 無効（disabled）
- severity: must
  text: "フォームの操作ができない状態を表現する際は、Input など内包する要素の `disabled` を使用する"
  source_section: "状態 > 無効（disabled）"
  sub_items:
    - "そもそも無効ではなくフォーム自体を非表示にしたり、無効状態の理由を付近に表示することを検討する"

# 状態 > 読み取り専用
- severity: must
  text: "入力内容の確認時など、すでに入力済みの書き換えできない値として表示する際は、Input など内包する要素の `readOnly` を使用する"
  source_section: "状態 > 読み取り専用"
