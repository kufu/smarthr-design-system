items:
  # 使用上の注意 > オブジェクト自体を切り替える場合はTabBarを使用する
  - severity: must
    text: 'ビューに存在するオブジェクト自体を切り替える場合は TabBar を使う'
    source_section: '使用上の注意 > オブジェクト自体を切り替える場合はTabBarを使用する'

  # 使用上の注意 > オン・オフを切り替える場合にはSwitchを使用する
  - severity: must
    text: 'オンとオフの 2 つの状態を切り替えるときは Switch を使う'
    source_section: '使用上の注意 > オン・オフを切り替える場合にはSwitchを使用する'

  # 使用上の注意 > 選択とは別に適用操作を行う場合はRadioButtonを使用する
  - severity: must
    text: '選択操作後に `送信` や `保存` などのボタンを押して入力内容を適用する場合は RadioButton を使う'
    source_section: '使用上の注意 > 選択とは別に適用操作を行う場合はRadioButtonを使用する'

  # モバイル > ボタンを折り返して表示しない
  - severity: must
    text: 'モバイル表示など画面幅が小さくなった際に SegmentedControl のボタンを折り返さない'
    source_section: 'モバイル > ボタンを折り返して表示しない'
    sub_items:
      - 'ボタンのラベルを折り返す'
      - 'Reel を使用して水平方向にスクロールさせる'
      - '`S` サイズの SegmentedControl を使用する（どうしようもないときにのみ）'
