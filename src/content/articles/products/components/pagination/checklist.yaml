items:
  # モバイル > Paginationの代わりに、データを追加で読み込むボタンの利用を検討する
  - severity: should
    text: 'モバイルでは Pagination の代わりに、データを追加で読み込んで表示するボタン（例: よくあるリストの「さらに表示」ボタン）の利用を検討する'
    source_section: 'モバイル > Paginationの代わりに、データを追加で読み込むボタンの利用を検討する'
    sub_items:
      - 'ただし、表示されるデータの件数が多いと想定される場合や、一覧上から特定のデータを探して操作することが主要な使われ方として想定される場合は、モバイルでも Pagination が適していることがある'

  - severity: must
    text: 'モバイルで Pagination を表示する場合は、`withoutNumber` props を有効にするか、`padding` props に 0〜1 の値を設定する'
    source_section: 'モバイル > Paginationの代わりに、データを追加で読み込むボタンの利用を検討する'
