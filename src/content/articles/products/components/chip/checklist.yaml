items:
  # 使用上の注意 > オブジェクトのステータス表示に使用しない
  - severity: must
    text: 'オブジェクトのステータス表示には Chip を使わず、StatusLabel を使う'
    source_section: '使用上の注意 > オブジェクトのステータス表示に使用しない'

  # 使用上の注意 > 操作フィードバックの表示に使用しない
  - severity: should
    text: '操作フィードバックの表示には Chip を使わず、ResponseMessage や NotificationBar の使用を検討する'
    source_section: '使用上の注意 > 操作フィードバックの表示に使用しない'

  # 使用上の注意 > 重要な情報の表示に使用しない
  - severity: must
    text: '入力の必須条件や必ず確認させたいメッセージなど重要な情報の表示には Chip を使わず、ResponseMessage や InformationPanel を使う'
    source_section: '使用上の注意 > 重要な情報の表示に使用しない'

  # 使用上の注意 > リンクを含めない
  - severity: must
    text: 'Chip 内のテキストの一部または全部にリンクを含めず、リンクを使用したい場合は TextLink を使う'
    source_section: '使用上の注意 > リンクを含めない'

  # 使用上の注意 > アクションの要素を含めない
  - severity: should
    text: 'Chip にアクションの要素を含めず、アクション要素を持たせたい場合は Button などの使用を検討する'
    source_section: '使用上の注意 > アクションの要素を含めない'
