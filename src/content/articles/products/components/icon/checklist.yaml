items:
  # 使用上の注意
  - severity: must
    text: '新たに追加したいアイコンがある場合は、smarthr-ui に新たにインポートしたいアイコンを追加して Pull Request を出す'
    source_section: '使用上の注意'

  # 状態
  - severity: should
    text: 'Icon に color を指定せず、使われているコンポーネントの色の指定に従わせる'
    source_section: '状態'

  # アクセシビリティ
  - severity: must
    text: '装飾以外の目的でアイコンを使用する場合は `alt` props に適切な代替テキストを付与する'
    source_section: 'アクセシビリティ'
    sub_items:
      - 'アイコンによって状態変化や操作を示す場合は代替テキストを付与する（例: 右矢印・調整済み・削除・追加）'
      - 'テキストのみで操作内容が伝わるアイコン（テキスト付き追加ボタンなど）には代替テキストを付与しない'
      - 'デフォルトのアバターなど用途自体を示すアイコンには代替テキストを付与しない'
