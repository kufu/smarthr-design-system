items:
  # 使用上の注意 > 短い一文で説明できるものに使用しない
  - severity: must
    text: '見出しと内容を必ずセットにして使用する'
    source_section: '使用上の注意 > 短い一文で説明できるものに使用しない'

  - severity: should
    text: '短い一文で説明できる場合は、ResponseMessage や NotificationBar の使用を検討する'
    source_section: '使用上の注意 > 短い一文で説明できるものに使用しない'

  # 使用上の注意 > 白背景の中に配置しない
  # (Layer 2 でカバー: design-system-guideline-prohibit-information-panel-in-white-bg)
  - severity: should
    text: 'InformationPanel では視覚的に強調されすぎる場合は、BaseColumn を使った代替パターンも検討する'
    source_section: '使用上の注意 > 白背景の中に配置しない'

  # レイアウト > [WIP] モバイル > 開閉ボタン
  - severity: must
    text: 'モバイルでは開閉ボタンをアイコンボタンで表示する'
    source_section: 'レイアウト > [WIP] モバイル > 開閉ボタン'
    note: 'smarthr-ui 未実装（WIP: モバイル自動切替予定）。要人間判断'

  # レイアウト > [WIP] モバイル > 余白
  - severity: must
    text: 'モバイルではコンポーネント内部の余白を 16px に変更する'
    source_section: 'レイアウト > [WIP] モバイル > 余白'
    note: 'smarthr-ui 未実装（WIP: モバイル自動切替予定）。要人間判断'

  # 状態 > デフォルト
  - severity: should
    text: '全文表示したままだと操作の妨げになるなど、利用者の使い勝手に影響する場合は開閉ボタンの表示を検討する'
    source_section: '状態 > デフォルト'

  - severity: should
    text: '開閉ボタンを表示する際は、利用者のストレスを避けるため開閉状態の保持を合わせて検討する'
    source_section: '状態 > デフォルト'
