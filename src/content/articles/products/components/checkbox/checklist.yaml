items:
  # 使用上の注意 > ユースケースに応じてコンポーネントを使い分ける > 選択肢が複数選択できる場合に使用する
  - severity: must
    text: 'チェックボックスは選択肢を複数選択できる場合に使う'
    source_section: '使用上の注意 > ユースケースに応じてコンポーネントを使い分ける > 選択肢が複数選択できる場合に使用する'
    sub_items:
      - '複数の選択肢から単一選択しかできず、表示領域に余裕がある場合は原則として RadioButton を検討する'
      - '選択肢が多い場合や表示領域が狭い場合は MultiCombobox を検討する'

  # 使用上の注意 > ユースケースに応じてコンポーネントを使い分ける > ビューの切り替えを操作するUIとして使用しない
  - severity: avoid
    text: '即時反映を前提とするビューの切り替えにチェックボックスを使わない'
    source_section: '使用上の注意 > ユースケースに応じてコンポーネントを使い分ける > ビューの切り替えを操作するUIとして使用しない'
    sub_items:
      - 'チェックボックスは入力後に `送信` や `保存` といった type 属性が `submit` のボタンなどを押すことで入力内容が反映される場合に使う'
      - '即時反映を前提とする箇所では TabBar や SegmentedControl、または Switch を使う'

  # 使用上の注意 > ユースケースに応じてコンポーネントを使い分ける > チェックボックスの並び順
  - severity: should
    text: '横幅に十分なスペースがある場合は基本的に横並びにする'
    source_section: '使用上の注意 > ユースケースに応じてコンポーネントを使い分ける > チェックボックスの並び順'
    sub_items:
      - '選択肢の文字が長くなる場合は縦並びを検討する'

  # 使用上の注意 > 2択の切り替えに使う場合の注意
  - severity: should
    text: '「ON/OFF」「有効/無効」「はい/いいえ」といった 2 択の切り替え入力には原則として RadioButton の利用を検討する'
    source_section: '使用上の注意 > 2択の切り替えに使う場合の注意'

  # 使用上の注意 > 2択の切り替えに使う場合の注意 > チェックボックスを2択の切り替え入力に使用できない場合
  - severity: must
    text: 'ブール値で制御できる項目で一方の選択肢が暗黙的になりチェック状態から現在の選択状態が認識しづらい場合は RadioButton を使う'
    source_section: '使用上の注意 > 2択の切り替えに使う場合の注意 > チェックボックスを2択の切り替え入力に使用できない場合'

  # 使用上の注意 > 2択の切り替えに使う場合の注意 > チェックボックスを2択の切り替え入力に使用できる場合
  - severity: should
    text: 'ラベルや説明文、ほかの設定項目など前後のコンテキストによりもう一方の選択肢が明示的な場合はチェックボックスを使える'
    source_section: '使用上の注意 > 2択の切り替えに使う場合の注意 > チェックボックスを2択の切り替え入力に使用できる場合'
    sub_items:
      - '利用規約への同意や、削除ダイアログでの重要な操作に対する注意事項の確認など、ユーザーに対して明示的な許諾や確認を求める場合にも使える'

  # 使用上の注意 > チェックボックス内に操作可能な要素を含めない
  - severity: avoid
    text: 'チェックボックス内にヘルプページへのリンクやフォームなど、値を選択する以外の操作可能な要素を配置しない'
    source_section: '使用上の注意 > チェックボックス内に操作可能な要素を含めない'
    sub_items:
      - 'チェックボックスの操作に関連するリンクを置きたい場合は Fieldset の `helpMessage` props などを使う'

  # 状態 > デフォルト
  - severity: should
    text: 'どの選択肢もチェックされていない状態をデフォルトにする'
    source_section: '状態 > デフォルト'
    sub_items:
      - 'ユーザーの入力作業が向上したりミスを減らせる場合にはデフォルトで選択肢にチェックを入れることを検討する'

  # 状態 > 混在（mixed）
  - severity: should
    text: '複数のチェックボックスの状態をまとめて示す必要があるチェックボックスで選択状態と未選択状態が混ざっている状態を示す場合は混在選択状態（`mixed=true`）を採用する'
    source_section: '状態 > 混在（mixed）'

  # モバイル
  - severity: must
    text: 'モバイル表示時は画面の幅が狭いため基本的に縦並びにする'
    source_section: 'モバイル'
    sub_items:
      - '誤操作を防ぐために小さい要素間のマージンに従って十分なマージンを確保する'
