items:
  # 使用上の注意 > 適切なサイズに調整して使用する
  - severity: must
    text: '入力する内容をあらかじめ精査し適切なサイズになるよう調整して使う'
    source_section: '使用上の注意 > 適切なサイズに調整して使用する'
    sub_items:
      - '幅は `width` props、高さは `rows` props で指定する。十分なサイズを確保する'
      - '入力によって自動で高さが広がってよい場合は `autoResize` props を指定する'
      - '高さを自動で広げつつ上限を設定する場合は `maxRows` props を指定する'
      - '入力する内容の文字数の予測が付く場合、過剰に高さを確保しない'
      - 'フォーム全体で見たときにレイアウトに統一性がなく感じられるときは、他の要素とのバランスを考慮してサイズを調整する'

  # 使用上の注意 > 入力できる文字数に上限がある場合は入力文字数を表示する
  - severity: must
    text: '入力できる文字数の上限が決まっている場合は `maxLetters` props を指定し、上限に応じた幅と高さに調整する'
    source_section: '使用上の注意 > 入力できる文字数に上限がある場合は入力文字数を表示する'

  # 使用上の注意 > ユースケースに応じてコンポーネントを使い分ける > 一行のテキスト入力が想定される場合は使用しない
  - severity: must
    text: '氏名やメールアドレスなどの一行のテキスト入力には Input を使う'
    source_section: '使用上の注意 > ユースケースに応じてコンポーネントを使い分ける > 一行のテキスト入力が想定される場合は使用しない'

  # 使用上の注意 > ユースケースに応じてコンポーネントを使い分ける > データの編集や送信を伴わない画面では使用しない
  - severity: must
    text: 'データの編集や送信を伴わない画面でデータを表示する場合は DefinitionList を使う'
    source_section: '使用上の注意 > ユースケースに応じてコンポーネントを使い分ける > データの編集や送信を伴わない画面では使用しない'

  # 使用上の注意 > 入力項目の説明や例をプレースホルダで表示しない
  - severity: avoid
    text: '入力項目の説明や例をプレースホルダで表示しない'
    source_section: '使用上の注意 > 入力項目の説明や例をプレースホルダで表示しない'
    sub_items:
      - '説明や例を載せる場合は FormControl のヘルプメッセージ（`helpMessage`）や入力例（`exampleMessage`）などを用い別途表示する'

  # 状態 > 無効（disabled）
  - severity: should
    text: '無効状態の使用にあたっては、そもそも無効ではなくフォーム自体を非表示にしたり、無効状態の理由を付近に表示することを検討する'
    source_section: '状態 > 無効（disabled）'

  # モバイル
  - severity: must
    text: 'モバイル向けブラウザでの意図しない拡大を避けるため、Textarea のフォントサイズは `M` 以上を使う'
    source_section: 'モバイル'

  - severity: should
    text: 'モバイルでは `autoResize` props を指定し、`maxRows` props は指定しないことを推奨する'
    source_section: 'モバイル'
    sub_items:
      - '一部のモバイル向けブラウザでは Textarea のリサイズに対応していないことがあり、Textarea 内でスクロールが発生すると操作しづらくなるため'
