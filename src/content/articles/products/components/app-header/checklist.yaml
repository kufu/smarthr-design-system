items:
  # レイアウト > Header > 2. 企業アカウント切替ボタン
  - severity: must
    text: '企業アカウントの切り替え機能を提供しない場合は、ユーザーが所属している企業アカウント名のみを表示する'
    source_section: 'レイアウト > Header > 2. 企業アカウント切替ボタン'

  # レイアウト > Header > 6. ユーザーアカウントボタン
  - severity: must
    text: 'ユーザーに関する操作やリンクを提供しない場合は、ユーザーのアカウント名のみを表示する'
    source_section: 'レイアウト > Header > 6. ユーザーアカウントボタン'

  # レイアウト > AppNavi > 3. データ同期ボタン（任意）
  - severity: should
    text: 'データ同期ボタンには前回同期した日時を `最終同期：yyyy/MM/dd H:mm` の形式で併記する'
    source_section: 'レイアウト > AppNavi > 3. データ同期ボタン（任意）'
    sub_items:
      - 'スペースに余裕がない場合は省略できる'

  # レイアウト > AppNavi > 4. リリースノートボタン（任意）
  - severity: should
    text: 'リリースノートはホーム画面などユーザーの利用開始の起点となる画面のコンテンツとして配置する'
    source_section: 'レイアウト > AppNavi > 4. リリースノートボタン（任意）'
    sub_items:
      - 'ホーム画面がない機能や、どの画面からもリリースノートにアクセスする可能性がある場合に限り、例外的にリリースノートボタンの配置を検討する'

  # モバイル
  - severity: must
    text: 'モバイル環境で省略された機能や情報には各ボタンからアクセスできるようにする'
    source_section: 'モバイル'
