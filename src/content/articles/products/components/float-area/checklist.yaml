items:
  # レイアウト > 基本的な考え方
  - severity: must
    text: 'FloatArea は画面内のどの部分が対象の領域なのかを視覚的に示すことを目指して、位置・幅・レイヤー順序を調整する'
    source_section: 'レイアウト > 基本的な考え方'

  # レイアウト > レイアウト例 > スクロール固定中
  - severity: must
    text: 'スクロール固定中の FloatArea は、対象の領域の左右に 0.5（8px）ずつはみ出し、画面の下辺から 1.5（24px）の余白をとった位置に置く'
    source_section: 'レイアウト > レイアウト例 > スクロール固定中'

  # レイアウト > レイアウト例 > スクロール固定解除後
  - severity: must
    text: 'スクロール固定解除後の FloatArea は、対象の領域の下辺との間に 1.5（24px）の余白を取る'
    source_section: 'レイアウト > レイアウト例 > スクロール固定解除後'

  # モバイル
  - severity: should
    text: 'モバイルでは FloatArea を画面の下部に固定せず、対象の領域の末尾に置く'
    source_section: 'モバイル'
    note: 'smarthr-ui 未実装（WIP: モバイル対応実装予定）。除外検討'

  - severity: must
    text: 'モバイルで FloatArea を画面の下部に固定する場合は、キーボード入力時（入力要素にフォーカス中）に FloatArea の固定を解除して操作領域を確保する'
    source_section: 'モバイル'
    note: 'smarthr-ui 未実装（WIP: モバイル対応実装予定）。除外検討'

  # モバイル > レイアウト > 画面の下部に固定する場合
  - severity: must
    text: 'モバイルで FloatArea を画面の下部に固定する場合、左右の余白をなくし画面幅いっぱいに表示する'
    source_section: 'モバイル > レイアウト > 画面の下部に固定する場合'
    note: 'smarthr-ui 未実装（WIP: モバイル対応実装予定）。除外検討'

  - severity: must
    text: 'モバイルで Secondary ボタン（任意）と Primary ボタンは横いっぱいに並べる'
    source_section: 'モバイル > レイアウト > 画面の下部に固定する場合'
    note: 'smarthr-ui 未実装（WIP: モバイル対応実装予定）。除外検討'

  - severity: must
    text: 'モバイルで Tertiary ボタン（任意）は、Secondary・Primary ボタン群の下部に配置する'
    source_section: 'モバイル > レイアウト > 画面の下部に固定する場合'
    note: 'smarthr-ui 未実装（WIP: モバイル対応実装予定）。除外検討'
