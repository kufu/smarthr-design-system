# 使用上の注意 > ボタンとして使わない
- severity: avoid
  text: "TextLink はページを移動するためのリンク用途で使い、それ以外の処理を実行するボタンとして使わない"
  source_section: "使用上の注意 > ボタンとして使わない"

- severity: must
  text: "視覚的優先度の低いボタンを表現したい場合は Tertiary ボタンを使う"
  source_section: "使用上の注意 > ボタンとして使わない"

# レイアウト > アイコンの有無
- severity: should
  text: "特定の役割を示すためにアイコンを使う"
  source_section: "レイアウト > アイコンの有無"

# レイアウト > アイコンの有無 > アイコン付きテキストリンク
- severity: must
  text: "アイコンは左右どちらかにのみ指定する"
  source_section: "レイアウト > アイコンの有無 > アイコン付きテキストリンク"

# レイアウト > アイコンの有無 > アイコン付きテキストリンク > アイコン付き（左）
- severity: should
  text: "アイコン付き（左）はテキストリンクを押した移動先の意味・内容を想起させるために使用する"
  source_section: "レイアウト > アイコンの有無 > アイコン付きテキストリンク > アイコン付き（左）"

# レイアウト > アイコンの有無 > アイコン付きテキストリンク > アイコン付き（右）
- severity: should
  text: "アイコン付き（右）はテキストリンクを押したときの挙動を表現するために使用する"
  source_section: "レイアウト > アイコンの有無 > アイコン付きテキストリンク > アイコン付き（右）"

# デザインパターン > 特別なテキストリンク > 新規ウィンドウで開くテキストリンク
- severity: should
  text: "別画面に移動することで現在の画面での入力や作業が中断され作業効率が著しく落ちる場合は、新規ウィンドウ（新規タブ）でテキストリンクを開くことを検討する"
  source_section: "デザインパターン > 特別なテキストリンク > 新規ウィンドウで開くテキストリンク"

- severity: avoid
  text: "新規ウィンドウで開くテキストリンクには `アイコン付き（左）`（プレフィックス）を指定しない"
  source_section: "デザインパターン > 特別なテキストリンク > 新規ウィンドウで開くテキストリンク"

# デザインパターン > 特別なテキストリンク > ヘルプセンターを開くテキストリンク
- severity: should
  text: "ヘルプセンターを開くテキストリンクには HelpLink を使う"
  source_section: "デザインパターン > 特別なテキストリンク > ヘルプセンターを開くテキストリンク"

# デザインパターン > 特別なテキストリンク > 一階層上のコンテンツに戻るテキストリンク
- severity: should
  text: "一階層上のコンテンツに戻るテキストリンクには UpwardLink を使う"
  source_section: "デザインパターン > 特別なテキストリンク > 一階層上のコンテンツに戻るテキストリンク"

- severity: avoid
  text: "UpwardLink には `アイコン付き（右）`（サフィックス）を指定しない"
  source_section: "デザインパターン > 特別なテキストリンク > 一階層上のコンテンツに戻るテキストリンク"
