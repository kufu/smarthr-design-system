items:
  # レイアウト > インデント
  - severity: must
    text: 'UpwardLink のリンクテキストとメインコンテンツの左端を揃える'
    source_section: 'レイアウト > インデント'

  - severity: must
    text: 'メインコンテンツにサイドナビゲーションが隣接する場合は、`indent` を無効にする'
    source_section: 'レイアウト > インデント > 例外1. メインコンテンツにサイドナビゲーションが隣接する場合'

  - severity: must
    text: 'モバイルなど画面幅が狭い場合は、`indent` を無効にする'
    source_section: 'レイアウト > インデント > 例外2. モバイルでの表示'

  # ライティング
  - severity: must
    text: 'リンクテキストは基本的に `{一階層上の画面名}に戻る` と表記する'
    source_section: 'ライティング'
    sub_items:
      - 'パーマリンクで直接移動してきた場合など一階層上のコンテンツの特定や類推が難しい場合は、`{一階層上の画面名}{一階層上のコンテンツの種類}に戻る` と表記する（例: コレクションは `{画面名}一覧に戻る`）'
