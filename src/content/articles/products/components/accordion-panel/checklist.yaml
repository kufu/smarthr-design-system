items:
  # 使用上の注意 > AccordionPanelを乱用しない
  - severity: should
    text: '画面内の情報量や粒度、構造が適切かどうかを精査して AccordionPanel を使用する'
    source_section: '使用上の注意 > AccordionPanelを乱用しない'

  # 使用上の注意 > ModelessDialogとの使い分け
  - severity: should
    text: '「ヘルプページを参照しながら別の操作を行う」など、画面のスクロールに依存せずモードレスに情報を表示したい場合は、AccordionPanel ではなく ModelessDialog を使用する'
    source_section: '使用上の注意 > ModelessDialogとの使い分け'

  # レイアウト > アイコンの位置
  - severity: avoid
    text: '`iconPosition` props でアイコンを右に配置するのは非推奨'
    source_section: 'レイアウト > アイコンの位置'

  # レイアウト > デフォルトの開閉状態
  - severity: avoid
    text: 'ユーザーの操作や閲覧が必ず必要な、重要性の高い情報を AccordionPanel で隠さない'
    source_section: 'レイアウト > デフォルトの開閉状態'
    sub_items:
      - 'デフォルトで閉じる使い方の例: 一部のユーザーしか利用しない機能（例: 高度な設定など）を隠し画面の表示要素をシンプルに保ちたい場合'
      - 'デフォルトで閉じる使い方の例: 見出しを並べ、ユーザーに情報全体の構造を把握させたい場合'

  # アクセシビリティ > ユーザーが操作していないリストを勝手に閉じない
  - severity: must
    text: '`expandableMultiply` props は `expandableMultiply={true}` に指定する'
    source_section: 'アクセシビリティ > ユーザーが操作していないリストを勝手に閉じない'
    sub_items:
      - '`expandableMultiply={false}` だと、1つのリストを展開するとすでに展開している別のリストが同時に閉じ、ユーザーが予測・意図していない動きが発生するため非推奨'
