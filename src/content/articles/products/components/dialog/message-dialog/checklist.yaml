items:
  # 使用上の注意 > ダイアログを乱用しない
  - severity: should
    text: 'ダイアログとして表示する・操作させるべき内容なのか、慎重にユースケースを定義し使用を検討する'
    source_section: '使用上の注意 > ダイアログを乱用しない'

  # 使用上の注意 > 複数のモーダルダイアログを同時に表示しない (via MultipleModalWarning.mdx)
  - severity: avoid
    text: 'モーダルダイアログ（ActionDialog や MessageDialog）を 1 つの操作で複数個表示したり、モーダルダイアログ上の操作によって 2 つ目のモーダルダイアログを表示しない'
    source_section: '使用上の注意 > 複数のモーダルダイアログを同時に表示しない (via MultipleModalWarning.mdx)'

  # 使用上の注意 > フィードバックとして使わない
  - severity: must
    text: 'MessageDialog を原則として処理結果のフィードバックには使わず、フィードバックには NotificationBar や ResponseMessage などを使う'
    source_section: '使用上の注意 > フィードバックとして使わない'

  # レイアウト > 基準サイズ (via DialogBaseSize.mdx)
  - severity: should
    text: '入力要素を 1 つだけ持つなど、内容が極めて少ないダイアログには `XS` を使う'
    source_section: 'レイアウト > 基準サイズ (via DialogBaseSize.mdx)'

  - severity: should
    text: '要素が少なく、要素が垂直方向に並ぶ、広い横幅を必要としないダイアログには `S` を使う'
    source_section: 'レイアウト > 基準サイズ (via DialogBaseSize.mdx)'

  - severity: should
    text: '数行に渡るテキストの表示や、水平方向に要素を並べて表示する標準的なダイアログには `M` を使う'
    source_section: 'レイアウト > 基準サイズ (via DialogBaseSize.mdx)'

  - severity: should
    text: 'テーブルの表示やダイアログを複数カラムに分割するなど、広い横幅が必要なダイアログには `L` を使う'
    source_section: 'レイアウト > 基準サイズ (via DialogBaseSize.mdx)'

  - severity: should
    text: '広い横幅が必要で、`L` ではコンテンツが収まりきらないダイアログには `XL` を使う'
    source_section: 'レイアウト > 基準サイズ (via DialogBaseSize.mdx)'

  - severity: should
    text: '広い横幅が必要で、`XL` ではコンテンツが収まりきらないダイアログには `XXL` を使う'
    source_section: 'レイアウト > 基準サイズ (via DialogBaseSize.mdx)'

  - severity: should
    text: '広い横幅が必要で、`XXL` ではコンテンツが収まりきらないダイアログには `FULL` を使う'
    source_section: 'レイアウト > 基準サイズ (via DialogBaseSize.mdx)'

  # 構成 > 1. タイトル
  - severity: must
    text: 'このダイアログで表示する情報を簡潔に表現するタイトルをつける'
    source_section: '構成 > 1. タイトル'

  - severity: should
    text: 'サブタイトルは基本的に使わない'
    source_section: '構成 > 1. タイトル'

  # 構成 > 2. 本文
  - severity: must
    text: '入力要素を含めたい場合は MessageDialog ではなく ActionDialog を使用する'
    source_section: '構成 > 2. 本文'

  # 構成 > 3. アクションボタン
  - severity: must
    text: 'ダイアログを閉じるボタンを配置し、ラベルは `閉じる` とする'
    source_section: '構成 > 3. アクションボタン'

  # モバイル
  - severity: should
    text: 'モバイルで情報量が多い場合は拡大したダイアログの採用を検討する'
    source_section: 'モバイル'
    sub_items:
      - '採用を検討するケース: ダイアログ内で多くのスクロールを伴う場合・入力や編集などキーボード入力操作が多い場合'
      - '［閉じる］ボタンはタイトルの右端に配置する'
      - 'ダイアログの左右と裏側の領域（スクリムで隠されている領域）のパディングは `0（0px）` とする'
    note: 'smarthr-ui 未実装（WIP: 拡大したダイアログ実装予定）。除外検討'
