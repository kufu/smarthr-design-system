items:
  # 使用上の注意 > 同じオブジェクトの異なる状態を切り替えて表示する目的に使用しない
  - severity: should
    text: 'TabBar は異なるオブジェクトやビューを切り替えるために使用し、同じオブジェクトの異なる状態を切り替えたい場合は SegmentedControl の使用を検討する'
    source_section: '使用上の注意 > 同じオブジェクトの異なる状態を切り替えて表示する目的に使用しない'

  # 使用上の注意 > ビューへの影響範囲を明確にする
  - severity: must
    text: 'TabBar を使用する際は、影響するビューの範囲を明確にする'
    source_section: '使用上の注意 > ビューへの影響範囲を明確にする'
    sub_items:
      - '基本的には、下線を設けることで影響するビューの範囲を明確にする'

  # レイアウト > IconやBadgeの有無
  - severity: must
    text: 'TabBarItem 内の Icon には、視覚情報と同等の情報を代替テキストなどを使って提供する'
    source_section: 'レイアウト > IconやBadgeの有無'

  # モバイル > スクロールですべてのタブを操作できるようにする
  - severity: should
    text: 'モバイル表示など横幅の狭い画面で TabBar が画面に収まらない場合、Reel を使って水平方向にスクロールできるようにする'
    source_section: 'モバイル > スクロールですべてのタブを操作できるようにする'

  # モバイル > タブが少ない場合の表示
  - severity: should
    text: 'タブが 2〜3 程度の場合、TabBar を画面幅いっぱいに広げて各タブを均等に配置する'
    source_section: 'モバイル > タブが少ない場合の表示'
    sub_items:
      - 'タブに表示するテキストが長い場合は、このパターンには適していない'
