# 使用上の注意 > ユースケースに応じてコンポーネントを使い分ける > 選択肢が多すぎる場合は別のコンポーネントを検討する
- severity: should
  text: "選択肢の中から単一の値を選択して入力させる場合は、基本的にラジオボタンを使用する"
  source_section: "使用上の注意 > ユースケースに応じてコンポーネントを使い分ける > 選択肢が多すぎる場合は別のコンポーネントを検討する"
  sub_items:
    - "選択肢の数が不定で予測できないなどの理由がない限りはラジオボタンの使用を推奨する"

- severity: should
  text: "選択肢のラベルテキストが長大、または選択肢が表示領域に収まらないほど多い場合は Select や SingleCombobox も検討する"
  source_section: "使用上の注意 > ユースケースに応じてコンポーネントを使い分ける > 選択肢が多すぎる場合は別のコンポーネントを検討する"
  note: "長大・多すぎる の定義不在。除外検討"

# 使用上の注意 > ユースケースに応じてコンポーネントを使い分ける > 選択肢のラベルテキストはなるべく簡潔に同程度の文量で収める
- severity: must
  text: "ラジオボタンのラベルテキストは同程度の文量や行数になるように調整する"
  source_section: "使用上の注意 > ユースケースに応じてコンポーネントを使い分ける > 選択肢のラベルテキストはなるべく簡潔に同程度の文量で収める"

- severity: should
  text: "選択肢に補足説明やステータスラベルなど複数要素を追加したい場合や、選択肢を視覚的に強調したい場合は RadioButtonPanel を検討する"
  source_section: "使用上の注意 > ユースケースに応じてコンポーネントを使い分ける > 選択肢のラベルテキストはなるべく簡潔に同程度の文量で収める"

# 使用上の注意 > ユースケースに応じてコンポーネントを使い分ける > ビューの切り替えを操作するUIとして使用しない
- severity: must
  text: "ラジオボタンは入力後に `送信` や `保存` などの type=\"submit\" のボタンを押すことで内容が反映される場合に使用する"
  source_section: "使用上の注意 > ユースケースに応じてコンポーネントを使い分ける > ビューの切り替えを操作するUIとして使用しない"

- severity: must
  text: "即時反映を前提とする箇所では TabBar や SegmentedControl、または Switch を使用する"
  source_section: "使用上の注意 > ユースケースに応じてコンポーネントを使い分ける > ビューの切り替えを操作するUIとして使用しない"

# 使用上の注意 > ユースケースに応じてコンポーネントを使い分ける > ラジオボタンの並び順
- severity: should
  text: "横幅に十分なスペースがある場合は基本的に横並びにする"
  source_section: "使用上の注意 > ユースケースに応じてコンポーネントを使い分ける > ラジオボタンの並び順"
  sub_items:
    - "選択肢の文字が長くなる場合は縦並びを検討する"

# 使用上の注意 > ラジオボタン内に操作可能な要素を含めない
- severity: avoid
  text: "ラジオボタン内には、ヘルプページへのリンクや Input など、ユーザーが値を選択する以外の操作可能な要素を配置しない"
  source_section: "使用上の注意 > ラジオボタン内に操作可能な要素を含めない"

- severity: must
  text: "リンクを置きたい場合は Fieldset の `helpMessage` props などを使用する"
  source_section: "使用上の注意 > ラジオボタン内に操作可能な要素を含めない"

- severity: should
  text: "Combobox などで選択肢に応じて段階的に別の操作をさせたい場合は、RadioButton と `disabled` 状態の組み合わせ、またはステップを複数に分けたモードを検討する"
  source_section: "使用上の注意 > ラジオボタン内に操作可能な要素を含めない"

# 状態 > デフォルト
- severity: must
  text: "選択肢の中から 1 つデフォルト値に設定するものを決める"
  source_section: "状態 > デフォルト"

# デザインパターン > 選択肢のグルーピング
- severity: should
  text: "複数の選択肢を持つ項目をいくつも並べて表示する場合は、ラベルがかかる範囲や設定項目ごとの選択肢を区別しやすくするため BaseColumn でグルーピングする"
  source_section: "デザインパターン > 選択肢のグルーピング"

# モバイル
- severity: should
  text: "モバイルでは画面幅が狭いため基本的に縦並びにする"
  source_section: "モバイル"

- severity: must
  text: "誤操作を防ぐため、小さい要素間のマージンに従って十分なマージンを確保する"
  source_section: "モバイル"
